name: 'Post to WordPress'
description: 'Publish GFM Markdown files to WordPress'

inputs:
  directory:
    description: 'Set a base directory to find .md files'
    required: true
  force_publish:
    description: 'Force republish all posts'
    required: false
    default: 'false'
  extra_files:
    description: 'Comma-separated list of additional .md file paths outside the base directory to include'
    required: false
    default: ''
  default_status:
    description: 'Add a default status for your posts. Can be overridden by frontmatter.'
    required: false
    default: 'draft'

runs:
  using: node20
  main: dist/index.js